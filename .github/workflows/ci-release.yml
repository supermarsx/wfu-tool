name: CI / Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: wfu-tool-ci-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: pwsh

env:
  WFU_TOOL_CI_MODE: '1'
  POWERSHELL_TELEMETRY_OPTOUT: '1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  format:
    name: Format
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Check format
        run: ./devscripts/Check-Format.ps1

  type:
    name: Type
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Check type
        run: ./devscripts/Check-Type.ps1

  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Check lint
        run: ./devscripts/Check-Lint.ps1

  test:
    name: Test
    runs-on: windows-latest
    needs: [format, type, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Run test suite
        run: ./tests/Test-Runner.ps1 -Filter '*'

  build_test:
    name: Build Test
    runs-on: windows-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Run build test
        run: ./devscripts/Build-Test.ps1

  package:
    name: Package
    runs-on: windows-latest
    needs: [build_test]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Compute CI package version
        run: |
          $sha7 = $env:GITHUB_SHA.Substring(0, 7)
          if ($env:GITHUB_EVENT_NAME -eq 'pull_request') {
            $packageVersion = "pr-$($env:GITHUB_RUN_NUMBER)-$sha7"
          } else {
            $packageVersion = "ci-$($env:GITHUB_RUN_NUMBER)-$sha7"
          }
          "WFU_TOOL_PACKAGE_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WFU_TOOL_PACKAGE_OUTPUT_ROOT=$($env:RUNNER_TEMP)\wfu-tool-package" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package for CI validation
        run: ./devscripts/Package.ps1 -Version $env:WFU_TOOL_PACKAGE_VERSION -OutputRoot $env:WFU_TOOL_PACKAGE_OUTPUT_ROOT -KeepStaging

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: wfu-tool-package-ci
          path: ${{ env.WFU_TOOL_PACKAGE_OUTPUT_ROOT }}
          if-no-files-found: error
          retention-days: 14

  release_version:
    name: Release Version
    runs-on: windows-latest
    needs: [package]
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
      release_name: ${{ steps.compute.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Compute release version
        id: compute
        run: |
          $ErrorActionPreference = 'Stop'
          git fetch --force --tags --prune
          $release = ./devscripts/Get-ReleaseVersion.ps1 -RepositoryRoot $PWD | Select-Object -Last 1
          if (-not $release -or $release.Status -ne 'Resolved') {
            throw 'Failed to compute a release tag.'
          }
          "version=$($release.Version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag=$($release.TagName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_name=$($release.Version)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  publish_github_release:
    name: Publish GitHub Release
    runs-on: windows-latest
    needs: [release_version, package]
    if: ${{ needs.release_version.result == 'success' }}
    permissions:
      contents: write
    outputs:
      version: ${{ needs.release_version.outputs.version }}
      tag: ${{ needs.release_version.outputs.tag }}
      release_name: ${{ needs.release_version.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: wfu-tool-package-ci
          path: ${{ runner.temp }}\wfu-tool-package-ci

      - name: Repackage for release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseRoot = Join-Path $env:RUNNER_TEMP 'wfu-tool-release-package'
          New-Item -ItemType Directory -Force -Path $releaseRoot | Out-Null
          ./devscripts/Package.ps1 -Version '${{ needs.release_version.outputs.version }}' -OutputRoot $releaseRoot -KeepStaging

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseRoot = Join-Path $env:RUNNER_TEMP 'wfu-tool-release-package'
          ./devscripts/Publish-GitHubRelease.ps1 -Version '${{ needs.release_version.outputs.version }}' -TagName '${{ needs.release_version.outputs.tag }}' -ReleaseName '${{ needs.release_version.outputs.release_name }}' -ArtifactRoot $releaseRoot

  publish_winget:
    name: Publish winget
    runs-on: windows-latest
    needs: [release_version, publish_github_release]
    if: ${{ needs.publish_github_release.result == 'success' && vars.ENABLE_WINGET == 'true' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Publish winget package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'wfu-tool-winget-package'
          ./devscripts/Package.ps1 -Version '${{ needs.release_version.outputs.version }}' -OutputRoot $artifactRoot | Out-Null
          ./devscripts/Publish-Winget.ps1 -Version '${{ needs.release_version.outputs.version }}' -ArtifactRoot $artifactRoot -CreatePullRequest

  publish_chocolatey:
    name: Publish Chocolatey
    runs-on: windows-latest
    needs: [release_version, publish_github_release]
    if: ${{ needs.publish_github_release.result == 'success' && vars.ENABLE_CHOCO == 'true' }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Restore PowerShell module cache
        uses: actions/cache@v5
        with:
          path: ~\Documents\PowerShell\Modules
          key: ${{ runner.os }}-psmodules-${{ hashFiles('**/*.ps1', '**/*.psm1', '**/*.psd1') }}
          restore-keys: |
            ${{ runner.os }}-psmodules-

      - name: Ensure PowerShell modules
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          foreach ($module in @(
            @{ Name = 'PSScriptAnalyzer' }
            @{ Name = 'Pester' }
          )) {
            if (-not (Get-Module -ListAvailable -Name $module.Name)) {
              Install-Module -Name $module.Name -Scope CurrentUser -Force -AllowClobber -Confirm:$false
            }
          }

      - name: Publish Chocolatey package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactRoot = Join-Path $env:RUNNER_TEMP 'wfu-tool-choco-package'
          ./devscripts/Package.ps1 -Version '${{ needs.release_version.outputs.version }}' -OutputRoot $artifactRoot | Out-Null
          ./devscripts/Publish-Chocolatey.ps1 -Version '${{ needs.release_version.outputs.version }}' -ArtifactRoot $artifactRoot -Push
